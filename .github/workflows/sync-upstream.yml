name: Sync Upstream

# 自动从上游 colbymchenry/codegraph 同步到本 fork。
# 每天 06:00 UTC 运行 + 支持手动触发。
#
# 流程：
#   git merge upstream/main（自动解决冲突）
#   → ensure-zcode-files.sh（确保 ZCode 文件完整）
#   → npm ci → npm run build
#   → 同步插件版本号
#   → commit + push
#
# 冲突策略：
#   - README.md → 始终保留 ZCode 中文版
#   - install.sh → 始终保留 ZCode 版本
#   - registry.ts / types.ts → 保留 ZCode 版 + 脚本自动修复
#   - 其他冲突 → 保留 ZCode 版 + 日志告警

on:
  schedule:
    # 每天 06:00 UTC（北京时间 14:00）
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      upstream-ref:
        description: '要同步的上游分支/tag/SHA（默认: main）'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          ref: main
          # SYNC_PAT 是用户自行设置的 PAT，用于绕过分支保护
          token: ${{ secrets.SYNC_PAT || github.token }}
          fetch-depth: 0

      - name: 配置 git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 添加上游仓库
        run: |
          git remote add upstream https://github.com/colbymchenry/codegraph.git
          git fetch upstream

      - name: 检查上游是否有新提交
        id: check
        run: |
          UPSTREAM_REF="upstream/${{ inputs.upstream-ref || 'main' }}"
          BASE=$(git merge-base HEAD "$UPSTREAM_REF")
          UPSTREAM_HEAD=$(git rev-parse "$UPSTREAM_REF")

          echo "merge-base: $BASE"
          echo "upstream-head: $UPSTREAM_HEAD"
          echo "our-head:     $(git rev-parse HEAD)"

          if [ "$BASE" = "$UPSTREAM_HEAD" ]; then
            echo "已经是最新，无需同步。"
            echo "needs-sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs-sync=true" >> "$GITHUB_OUTPUT"
            echo "upstream-head=$UPSTREAM_HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: 合并上游更新（自动解决冲突）
        if: steps.check.outputs.needs-sync == 'true'
        id: merge
        run: |
          UPSTREAM_REF="upstream/${{ inputs.upstream-ref || 'main' }}"

          echo "::group::待合并的上游提交"
          git log --oneline HEAD.."$UPSTREAM_REF"
          echo "::endgroup::"

          # 尝试合并（不自动提交）
          if git merge --no-commit --no-ff "$UPSTREAM_REF" 2>/dev/null; then
            echo "✅ 无冲突合并成功。"
          else
            echo "::warning::发现合并冲突，自动解决中..."

            # README.md → 始终保留 ZCode 中文版
            if git ls-files --unmerged | grep -q "README.md"; then
              git checkout --ours README.md && git add README.md
              echo "  ✅ README.md → 保留 ZCode 版本"
            fi

            # install.sh → 始终保留 ZCode 版本
            if git ls-files --unmerged | grep -q "install.sh"; then
              git checkout --ours install.sh && git add install.sh
              echo "  ✅ install.sh → 保留 ZCode 版本"
            fi

            # 其他冲突文件 → 全部保留 ZCode 版本
            REMAINING=$(git diff --name-only --diff-filter=U 2>/dev/null || true)
            if [ -n "$REMAINING" ]; then
              echo "$REMAINING" | while read -r f; do
                git checkout --ours "$f" && git add "$f"
                echo "  ⚠️  $f → 保留 ZCode 版本（建议复查）"
              done
            fi
          fi

          # 运行 ZCode 文件完整性检查脚本
          echo "::group::ZCode 文件完整性检查"
          bash scripts/ensure-zcode-files.sh
          echo "::endgroup::"

          # 提交合并（如果有未提交的变更）
          if git diff --cached --quiet; then
            echo "合并后无变更，跳过提交。"
          else
            git commit -m "chore(sync): merge upstream/main" -m "自动合入上游更新。冲突已自动解决（ZCode 版本优先）。"
            echo "✅ 合并已提交。"
          fi

          echo "merged=true" >> "$GITHUB_OUTPUT"

      - name: 安装 Node.js
        if: steps.merge.outputs.merged == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 安装依赖并编译
        if: steps.merge.outputs.merged == 'true'
        run: |
          npm ci
          npm run build

      - name: 同步插件版本号
        if: steps.merge.outputs.merged == 'true'
        id: version-sync
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "上游版本: $PKG_VERSION"

          # 更新 plugin.json 版本
          PLUGIN_JSON=".zcode-plugin/plugin.json"
          if [ -f "$PLUGIN_JSON" ]; then
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$PLUGIN_JSON', 'utf-8'));
              p.version = '$PKG_VERSION';
              fs.writeFileSync('$PLUGIN_JSON', JSON.stringify(p, null, 4) + '\n');
            "
            echo "已更新 $PLUGIN_JSON → $PKG_VERSION"
          fi

          # 更新 .zcode-plugin-seed.json 版本
          SEED_JSON=".zcode-plugin-seed.json"
          if [ -f "$SEED_JSON" ]; then
            node -e "
              const fs = require('fs');
              const s = JSON.parse(fs.readFileSync('$SEED_JSON', 'utf-8'));
              s.pluginVersion = '$PKG_VERSION';
              fs.writeFileSync('$SEED_JSON', JSON.stringify(s, null, 4) + '\n');
            "
            echo "已更新 $SEED_JSON → $PKG_VERSION"
          fi

          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: 提交编译产物
        if: steps.merge.outputs.merged == 'true'
        run: |
          git add dist/ .zcode-plugin/plugin.json .zcode-plugin-seed.json install.sh skills/ scripts/
          
          if git diff --cached --quiet; then
            echo "编译后无变化，跳过提交。"
          else
            git commit -m "chore(sync): rebuild dist and sync plugin version to v${{ steps.version-sync.outputs.version }}" -m "[skip ci] 由 Sync Upstream 工作流自动生成。"
            echo "已提交编译产物。"
          fi

      - name: 推送到 GitHub
        if: steps.merge.outputs.merged == 'true'
        run: |
          git push origin HEAD:main
          echo "✅ 上游更新已同步、编译并推送到 origin/main。"

      - name: 无需同步
        if: steps.check.outputs.needs-sync == 'false'
        run: echo "✅ Fork 已经与上游保持一致。"
